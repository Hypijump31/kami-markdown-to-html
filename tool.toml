[tool]
id = "dev.kami.markdown-to-html"
name = "markdown-to-html"
version = "0.1.0"
wasm = "target/wasm32-wasip2/release/markdown_to_html.wasm"

[mcp]
description = "Convert Markdown to HTML with optional GFM extensions (tables, strikethrough, task lists)"

[[mcp.arguments]]
name = "markdown"
type = "string"
description = "Markdown source text to convert"
required = true

[[mcp.arguments]]
name = "options"
type = "object"
description = "GFM options: {tables, strikethrough, tasklists, smart_punctuation} — all boolean, default true"
required = false

[security]
fs_access = "none"
max_memory_mb = 32
max_execution_ms = 2000
